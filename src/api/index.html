<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Recommendation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input, select {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .song-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .song-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .song-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            font-size: 0.9em;
            font-weight: 600;
        }

        .stats {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-box {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-top: 3px solid #667eea;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.1em;
        }

        .error {
            background: #fee;
            border-left: 4px solid #f44;
            border-radius: 8px;
            padding: 15px;
            color: #c33;
            margin-top: 20px;
        }

        .success {
            background: #efe;
            border-left: 4px solid #4f4;
            border-radius: 8px;
            padding: 15px;
            color: #3c3;
            margin-top: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .feedback-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .feedback-form input {
            width: 100%;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Music Recommendation System</h1>
            <p class="subtitle">Discover music tailored to your taste</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('recommendations')">Recommendations</button>
            <button class="tab-btn" onclick="switchTab('similar')">Similar</button>
            <button class="tab-btn" onclick="switchTab('feedback')">Feedback</button>
            <button class="tab-btn" onclick="switchTab('stats')">Statistics</button>
        </div>

        <!-- Recommendations Tab -->
        <div id="recommendations" class="tab-content active">
            <div class="controls">
                <div class="control-group">
                    <label for="userId">User ID:</label>
                    <input type="number" id="userId" min="1" value="1" placeholder="Enter user ID">
                </div>
                <div class="control-group">
                    <label for="method">Method:</label>
                    <select id="method">
                        <option value="hybrid">Hybrid (Recommended)</option>
                        <option value="collaborative">Collaborative Filtering</option>
                        <option value="content">Content-Based</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="count">Number of Songs:</label>
                    <input type="number" id="count" min="1" max="20" value="10">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="getRecommendations()">Get Recommendations</button>
                    <button class="btn-secondary" onclick="clearResults()">Clear</button>
                </div>
            </div>
            <div id="results"></div>
        </div>

        <!-- Similar Tab -->
        <div id="similar" class="tab-content">
            <div class="controls">
                <div class="control-group">
                    <label for="similarType">Find Similar:</label>
                    <select id="similarType">
                        <option value="users">Users</option>
                        <option value="songs">Songs</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="similarId">ID:</label>
                    <input type="number" id="similarId" min="1" value="1" placeholder="Enter ID">
                </div>
                <div class="control-group">
                    <label for="similarCount">Count:</label>
                    <input type="number" id="similarCount" min="1" max="20" value="5">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="getSimilar()">Find Similar</button>
                    <button class="btn-secondary" onclick="clearResults()">Clear</button>
                </div>
            </div>
            <div id="results"></div>
        </div>

        <!-- Feedback Tab -->
        <div id="feedback" class="tab-content">
            <div class="feedback-form">
                <h2>Record Your Feedback</h2>
                <div class="controls" style="margin-top: 20px;">
                    <div class="control-group">
                        <label for="feedbackUserId">User ID:</label>
                        <input type="number" id="feedbackUserId" min="1" value="1">
                    </div>
                    <div class="control-group">
                        <label for="feedbackSongId">Song ID:</label>
                        <input type="number" id="feedbackSongId" min="1" value="1">
                    </div>
                    <div class="control-group">
                        <label for="feedbackRating">Rating (1-5):</label>
                        <input type="number" id="feedbackRating" min="1" max="5" step="0.5" value="5">
                    </div>
                    <div class="button-group">
                        <button class="btn-primary" onclick="recordFeedback()">Submit Feedback</button>
                        <button class="btn-secondary" onclick="clearFeedback()">Clear</button>
                    </div>
                </div>
            </div>
            <div id="feedbackResult"></div>
        </div>

        <!-- Stats Tab -->
        <div id="stats" class="tab-content">
            <div style="text-align: center; margin: 20px 0;">
                <button class="btn-primary" onclick="getStats()" style="width: 200px;">Load Statistics</button>
            </div>
            <div id="statsResult"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        async function getRecommendations() {
            const userId = document.getElementById('userId').value;
            const method = document.getElementById('method').value;
            const count = document.getElementById('count').value;

            if (!userId) {
                showError('Please enter a User ID');
                return;
            }

            showLoading();

            try {
                let endpoint = `/api/recommendations/${userId}?n=${count}`;
                if (method === 'collaborative') {
                    endpoint = `/api/recommendations/collaborative/${userId}?n=${count}`;
                } else if (method === 'content') {
                    endpoint = `/api/recommendations/content-based/${userId}?n=${count}`;
                }

                const response = await fetch(`${API_URL}${endpoint}`);
                const data = await response.json();

                if (response.ok) {
                    displayRecommendations(data);
                } else {
                    showError(data.error || 'Failed to get recommendations');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        function displayRecommendations(data) {
            const resultsDiv = document.getElementById('results');
            if (!data.recommendations || data.recommendations.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align: center; color: #999;">No recommendations found</p>';
                return;
            }

            let html = '<div class="results">';
            data.recommendations.forEach((rec, index) => {
                const percentage = (rec.score * 100).toFixed(1);
                html += `
                    <div class="song-card">
                        <div style="font-size: 2em; margin-bottom: 10px;">#${index + 1}</div>
                        <div class="song-title">Song ID: ${rec.song_id}</div>
                        <div class="song-score">Score: ${percentage}%</div>
                    </div>
                `;
            });
            html += '</div>';
            resultsDiv.innerHTML = html;
        }

        async function getSimilar() {
            const type = document.getElementById('similarType').value;
            const id = document.getElementById('similarId').value;
            const count = document.getElementById('similarCount').value;

            if (!id) {
                showError('Please enter an ID');
                return;
            }

            showLoading();

            try {
                let endpoint = `/api/similar-users/${id}?n=${count}`;
                if (type === 'songs') {
                    endpoint = `/api/similar-songs/${id}?n=${count}`;
                }

                const response = await fetch(`${API_URL}${endpoint}`);
                const data = await response.json();

                if (response.ok) {
                    displaySimilar(data, type);
                } else {
                    showError(data.error || 'Failed to find similar items');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        function displaySimilar(data, type) {
            const resultsDiv = document.getElementById('results');
            const items = type === 'users' ? (data.similar_users || []) : (data.similar_songs || []);

            if (items.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align: center; color: #999;">No similar items found</p>';
                return;
            }

            let html = '<div class="results">';
            items.forEach((item, index) => {
                const key = type === 'users' ? 'user_id' : 'song_id';
                const percentage = (item.similarity * 100).toFixed(1);
                html += `
                    <div class="song-card">
                        <div style="font-size: 2em; margin-bottom: 10px;">#${index + 1}</div>
                        <div class="song-title">${type === 'users' ? 'User' : 'Song'} ID: ${item[key]}</div>
                        <div class="song-score">Similarity: ${percentage}%</div>
                    </div>
                `;
            });
            html += '</div>';
            resultsDiv.innerHTML = html;
        }

        async function recordFeedback() {
            const userId = document.getElementById('feedbackUserId').value;
            const songId = document.getElementById('feedbackSongId').value;
            const rating = document.getElementById('feedbackRating').value;

            if (!userId || !songId || !rating) {
                showErrorInDiv('feedbackResult', 'Please fill all fields');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        song_id: parseInt(songId),
                        rating: parseFloat(rating)
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccessInDiv('feedbackResult', `Feedback recorded! Rating: ${rating}/5`);
                    clearFeedback();
                } else {
                    showErrorInDiv('feedbackResult', data.error || 'Failed to record feedback');
                }
            } catch (error) {
                showErrorInDiv('feedbackResult', 'Error: ' + error.message);
            }
        }

        async function getStats() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const data = await response.json();

                if (response.ok) {
                    displayStats(data);
                } else {
                    showErrorInDiv('statsResult', data.error || 'Failed to load statistics');
                }
            } catch (error) {
                showErrorInDiv('statsResult', 'Error: ' + error.message);
            }
        }

        function displayStats(data) {
            let html = '<div class="stats">';
            html += `<div class="stat-box"><div class="stat-value">${data.total_songs}</div><div class="stat-label">Total Songs</div></div>`;
            html += `<div class="stat-box"><div class="stat-value">${data.total_users}</div><div class="stat-label">Total Users</div></div>`;
            html += `<div class="stat-box"><div class="stat-value">${data.total_interactions}</div><div class="stat-label">Total Interactions</div></div>`;
            html += `<div class="stat-box"><div class="stat-value">${(data.collaborative_weight * 100).toFixed(0)}%</div><div class="stat-label">Collaborative Weight</div></div>`;
            html += `<div class="stat-box"><div class="stat-value">${(data.content_weight * 100).toFixed(0)}%</div><div class="stat-label">Content Weight</div></div>`;
            html += '</div>';
            document.getElementById('statsResult').innerHTML = html;
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        function clearFeedback() {
            document.getElementById('feedbackUserId').value = '1';
            document.getElementById('feedbackSongId').value = '1';
            document.getElementById('feedbackRating').value = '5';
            document.getElementById('feedbackResult').innerHTML = '';
        }

        function showLoading() {
            document.getElementById('results').innerHTML = '<div class="loading">Loading...</div>';
        }

        function showError(message) {
            document.getElementById('results').innerHTML = `<div class="error">${message}</div>`;
        }

        function showErrorInDiv(divId, message) {
            document.getElementById(divId).innerHTML = `<div class="error">${message}</div>`;
        }

        function showSuccessInDiv(divId, message) {
            document.getElementById(divId).innerHTML = `<div class="success">${message}</div>`;
        }
    </script>
</body>
</html>
