<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Recommendation System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Music Recommendation System</h1>
            <p class="subtitle">Discover music tailored to your taste</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('recommendations')">Recommendations</button>
            <button class="tab-btn" onclick="switchTab('similar')">Similar</button>
            <button class="tab-btn" onclick="switchTab('feedback')">Feedback</button>
            <button class="tab-btn" onclick="switchTab('stats')">Statistics</button>
        </div>

        <!-- Recommendations Tab -->
        <div id="recommendations" class="tab-content active">
            <div class="controls">
                <div class="control-group">
                    <label for="userId">User ID:</label>
                    <input type="number" id="userId" min="1" value="1" placeholder="Enter user ID">
                </div>
                <div class="control-group">
                    <label for="method">Method:</label>
                    <select id="method">
                        <option value="hybrid">Hybrid (Recommended)</option>
                        <option value="collaborative">Collaborative Filtering</option>
                        <option value="content">Content-Based</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="count">Number of Songs:</label>
                    <input type="number" id="count" min="1" max="20" value="10">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="getRecommendations()">Get Recommendations</button>
                    <button class="btn-secondary" onclick="clearResults()">Clear</button>
                </div>
            </div>
            <div id="results"></div>
        </div>

        <!-- Similar Tab -->
        <div id="similar" class="tab-content">
            <div class="controls">
                <div class="control-group">
                    <label for="similarType">Find Similar:</label>
                    <select id="similarType">
                        <option value="users">Users</option>
                        <option value="songs">Songs</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="similarId">ID:</label>
                    <input type="number" id="similarId" min="1" value="1" placeholder="Enter ID">
                </div>
                <div class="control-group">
                    <label for="similarCount">Count:</label>
                    <input type="number" id="similarCount" min="1" max="20" value="5">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="getSimilar()">Find Similar</button>
                    <button class="btn-secondary" onclick="clearResults()">Clear</button>
                </div>
            </div>
            <div id="results"></div>
        </div>

        <!-- Feedback Tab -->
        <div id="feedback" class="tab-content">
            <div class="feedback-form">
                <h2>Record Your Feedback</h2>
                <div class="controls" style="margin-top: 20px;">
                    <div class="control-group">
                        <label for="feedbackUserId">User ID:</label>
                        <input type="number" id="feedbackUserId" min="1" value="1">
                    </div>
                    <div class="control-group">
                        <label for="feedbackSongId">Song ID:</label>
                        <input type="number" id="feedbackSongId" min="1" value="1">
                    </div>
                    <div class="control-group">
                        <label for="feedbackRating">Rating (1-5):</label>
                        <input type="number" id="feedbackRating" min="1" max="5" step="0.5" value="5">
                    </div>
                    <div class="button-group">
                        <button class="btn-primary" onclick="recordFeedback()">Submit Feedback</button>
                        <button class="btn-secondary" onclick="clearFeedback()">Clear</button>
                    </div>
                </div>
            </div>
            <div id="feedbackResult"></div>
        </div>

        <!-- Stats Tab -->
        <div id="stats" class="tab-content">
            <div style="text-align: center; margin: 20px 0;">
                <button class="btn-primary" onclick="getStats()" style="width: 200px;">Load Statistics</button>
            </div>
            <div id="statsResult"></div>
        </div>
    </div>

    <script src="/static/js/app.js" defer></script>
</body>
</html>
